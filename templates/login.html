<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — RE-CALL</title>
<link rel="icon" href="{{ url_for('static', filename='icon.png') }}">
<!-- UI assets: LOCAL files (default) — run `python get_vendor.py` once to download them.
     To use CDN instead: comment the local lines and uncomment the CDN block below each one. -->
<link rel="stylesheet" href="{{ url_for('static', filename='vendor/fonts.css') }}">
<!-- CDN option:
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
-->
<script>
  document.documentElement.dataset.theme = localStorage.getItem('recall-theme') || 'dark';
</script>
<script src="{{ url_for('static', filename='vendor/tailwind.js') }}"></script>
<!-- CDN option:
<script src="https://cdn.tailwindcss.com"></script>
-->
<script>
tailwind.config = {
  theme: { extend: {
    colors: {
      bg: 'var(--bg)', surface: 'var(--surface)', surface2: 'var(--surface-2)',
      ink: 'var(--ink)', muted: 'var(--muted)', line: 'var(--line)',
      accent: 'var(--accent)', accentink: 'var(--accent-ink)', danger: 'var(--danger)'
    },
    fontFamily: {
      display: ['"Bricolage Grotesque"', 'sans-serif'],
      body: ['Inter', 'sans-serif'],
      mono: ['"JetBrains Mono"', 'monospace']
    },
    boxShadow: { card: 'var(--shadow)' }
  }}
}
</script>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="{{ url_for('static', filename='vendor/lucide.min.js') }}"></script>
<!-- CDN option:
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
-->
</head>
<body class="bg-bg text-ink font-body bg-grid">

<div class="min-h-dvh grid place-items-center p-5">
  <form method="POST" class="w-[min(400px,100%)] bg-surface border border-line rounded-2xl shadow-card p-9 text-center">
    <div class="mx-auto w-12 h-12 grid place-items-center rounded-xl bg-surface2 border border-line mb-4">
      <i data-lucide="lock-keyhole" class="w-5 h-5 text-accent"></i>
    </div>
    <h2 class="font-display font-bold tracking-tight text-2xl m-0 mb-1">Unlock logbook</h2>
    <p class="text-muted text-sm m-0 mb-6">Managing entries needs your dashboard password.</p>
    {% if error %}<p class="text-danger text-sm m-0 mb-4">{{ error }}</p>{% endif %}
    <input type="password" name="password" placeholder="Password" autofocus required
      class="w-full bg-bg border border-line rounded-xl px-4 py-3 font-medium text-[.95rem]
             focus:outline-none focus:border-accent transition-colors mb-4">
    <button type="submit" class="btn-primary w-full justify-center">
      <i data-lucide="unlock" class="w-4 h-4"></i>Sign in
    </button>
    <a href="/" class="inline-flex items-center gap-1.5 text-muted text-sm mt-5 no-underline hover:text-ink">
      <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i>Back to search
    </a>
  </form>
</div>

<script>lucide.createIcons();</script>
</body>
</html>
